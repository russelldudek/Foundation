name: Publish corrected candidate experience

on:
  push:
    branches: [main]
    paths:
      - 'release-v2/**'
      - '.github/workflows/publish-v2.yml'

permissions:
  contents: write

concurrency:
  group: foundation-data-candidate-release
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out merged release
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Reconstruct clean campaign source
        shell: bash
        run: |
          set -euo pipefail
          cat release-v2/source.tar.xz.b64.* | base64 --decode > /tmp/foundation-v2-source.tar.xz
          echo '060061641ed6e9924c7c9d310cd8f1943b944327ab72d6678266fb579590f8e5  /tmp/foundation-v2-source.tar.xz' | sha256sum --check
          mkdir -p /tmp/foundation-v2
          tar -xJf /tmp/foundation-v2-source.tar.xz -C /tmp/foundation-v2
          cp release-v2/foundation-data-logo-white.webp.b64 /tmp/logo-white.b64
          cp release-v2/foundation-data-logo-white-trimmed.webp.b64 /tmp/logo-trimmed.b64
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/foundation-v2/. .
          mkdir -p assets/brand
          base64 --decode /tmp/logo-white.b64 > assets/brand/foundation-data-logo-white.webp
          base64 --decode /tmp/logo-trimmed.b64 > assets/brand/foundation-data-logo-white-trimmed.webp

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PDF runtime
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Generate native PDFs
        run: npm run generate:pdfs

      - name: Run interaction regression audit
        shell: bash
        run: |
          cat > scripts/release-audit.mjs <<'AUDIT'
          import { chromium } from 'playwright';
          import { resolve } from 'node:path';
          import { pathToFileURL } from 'node:url';
          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({ viewport: { width: 1440, height: 900 } });
          const errors = [];
          page.on('pageerror', error => errors.push(String(error)));
          await page.goto(pathToFileURL(resolve('index.html')).href, { waitUntil: 'load' });
          const assert = (condition, message) => { if (!condition) throw new Error(message); };
          assert(await page.locator('[data-signal]').count() === 4, 'Expected four signal controls');
          assert(await page.locator('[data-signal][aria-pressed="true"]').count() === 1, 'Expected exactly one authoritative signal');
          assert(await page.locator('dialog').count() === 0, 'Document modal architecture must be absent');
          await page.locator('[data-signal="analytics"]').click();
          assert((await page.locator('#processorTitle').textContent()).includes('Frame the decision'), 'Processor did not update');
          assert((await page.locator('#outcomeTitle').textContent()).includes('Decision-ready insight'), 'Outcome did not update');
          assert(await page.locator('[data-signal="analytics"]').getAttribute('aria-pressed') === 'true', 'Analytics control did not own state');
          assert(await page.locator('[data-signal][aria-pressed="true"]').count() === 1, 'Selection became ambiguous');
          await page.waitForTimeout(1900);
          assert(!(await page.locator('.decision-path').getAttribute('class')).includes('is-running'), 'Motion did not settle');
          assert(await page.locator('a[href="resume.html"]').count() > 0, 'Resume web route is missing');
          assert(await page.locator('a[download][href$="Resume.pdf"]').count() > 0, 'Resume native PDF download is missing');
          const mobile = await browser.newPage({ viewport: { width: 320, height: 700 } });
          await mobile.goto(pathToFileURL(resolve('index.html')).href, { waitUntil: 'load' });
          const overflow = await mobile.evaluate(() => document.documentElement.scrollWidth - document.documentElement.clientWidth);
          assert(overflow <= 1, `Narrow-phone overflow: ${overflow}px`);
          assert(errors.length === 0, `Browser errors: ${errors.join('; ')}`);
          await browser.close();
          AUDIT
          node scripts/release-audit.mjs

      - name: Verify document and PDF contracts
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils
          grep -q 'Scout decision path' index.html
          grep -q 'Five complete artifacts. One strategic story.' index.html
          ! grep -qi '<dialog' index.html
          test "$(pdfinfo docs/Russell-Dudek-Foundation-Data-Resume.pdf | awk '/^Pages:/ {print $2}')" = '2'
          test "$(pdfinfo docs/Russell-Dudek-Foundation-Data-Cover-Letter.pdf | awk '/^Pages:/ {print $2}')" = '1'
          test "$(pdfinfo docs/Russell-Dudek-Foundation-Data-Interview-Thesis-Brief.pdf | awk '/^Pages:/ {print $2}')" = '4'
          test "$(pdfinfo docs/Russell-Dudek-Foundation-Data-120-Day-Plan.pdf | awk '/^Pages:/ {print $2}')" = '3'
          test "$(pdfinfo docs/Russell-Dudek-Foundation-Data-Operating-Review.pdf | awk '/^Pages:/ {print $2}')" = '2'

      - name: Refresh readable artifact manifest
        shell: bash
        run: |
          rm -rf node_modules package-lock.json
          python - <<'PY'
          from pathlib import Path
          import hashlib
          root = Path('.')
          files = []
          for path in sorted(root.rglob('*')):
              if not path.is_file() or '.git' in path.parts or path.name == 'artifact-manifest.md':
                  continue
              files.append((path.as_posix(), hashlib.sha256(path.read_bytes()).hexdigest()))
          lines = [
              '# Foundation Data Candidate Campaign — Artifact Manifest',
              '',
              'This manifest records the readable source and generated artifacts published on the canonical `main` branch.',
              '',
              '## Integrity checks',
              '',
              '- One authoritative hero signal is selected at a time.',
              '- Processor treatment, outcome, evidence, and decision update atomically.',
              '- The motion initializes, shows a causal intermediate state, and settles.',
              '- No document modal or print-as-download substitute is shipped.',
              '- Five dedicated web document routes and five native PDF downloads are present.',
              '- Resume / cover letter reciprocal navigation is present.',
              '- PDF page counts are 2 / 1 / 4 / 3 / 2.',
              '',
              '## SHA-256',
              '',
          ]
          lines.extend(f'- `{name}` — `{digest}`' for name, digest in files)
          Path('artifact-manifest.md').write_text('\n'.join(lines) + '\n')
          PY

      - name: Commit clean audited campaign
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish corrected Foundation Data candidate experience'
          git push origin HEAD:main
          git push --force origin HEAD:gh-pages
