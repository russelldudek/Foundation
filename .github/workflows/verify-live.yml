name: Verify live candidate vision

on:
  push:
    branches: [main]
    paths:
      - index.html
      - 404.html
      - .github/workflows/deploy-pages.yml
      - .github/workflows/verify-live.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: verify-live-foundation
  cancel-in-progress: true

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Wait for GitHub Pages and verify content
        shell: bash
        run: |
          set -euo pipefail
          URL='https://russelldudek.github.io/Foundation/'
          for attempt in $(seq 1 36); do
            code=$(curl -L -sS -o /tmp/live.html -w '%{http_code}' "$URL" || true)
            if [ "$code" = '200' ] && grep -q 'Make strategy' /tmp/live.html && grep -q 'Foundation Data Director of Operations' /tmp/live.html; then
              printf 'Live URL: %s\nHTTP status: %s\nVerified main source phrase: Make strategy load-bearing.\nVerified at UTC: %s\n' "$URL" "$code" "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > /tmp/live-verification.txt
              exit 0
            fi
            echo "Attempt $attempt: HTTP $code; waiting for Pages deployment"
            sleep 10
          done
          echo 'GitHub Pages did not return the expected homepage before timeout.' >&2
          exit 1
      - name: Commit live verification receipt
        run: |
          mkdir -p qa
          cp /tmp/live-verification.txt qa/live-verification.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add qa/live-verification.txt
          git commit -m 'Verify live Foundation Data candidate vision'
          git push origin HEAD:main
