name: Bootstrap candidate campaign

on:
  push:
    branches: [main]
    paths:
      - 'bootstrap/**'
      - '.github/workflows/bootstrap.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bootstrap-candidate-campaign
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out bootstrap commit
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - name: Reconstruct source package
        run: |
          cat bootstrap/source.b64.* | base64 --decode > /tmp/foundation-source.zip
          echo '20fb6dcaebf258db238c3c0f190c0ea177ee431ee9b6230b107816febaa71c0a  /tmp/foundation-source.zip' | sha256sum --check
          unzip -t /tmp/foundation-source.zip
          unzip -oq /tmp/foundation-source.zip -d .
          rm -rf bootstrap .github/workflows/bootstrap.yml docs
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Generate PDFs
        run: npm run generate:pdfs
      - name: Verify page counts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils
          test "$(pdfinfo docs/Russell-Dudek-Foundation-Data-Resume.pdf | awk '/^Pages:/ {print $2}')" = "2"
          test "$(pdfinfo docs/Russell-Dudek-Foundation-Data-Cover-Letter.pdf | awk '/^Pages:/ {print $2}')" = "1"
          test "$(pdfinfo docs/Russell-Dudek-Foundation-Data-Interview-Thesis-Brief.pdf | awk '/^Pages:/ {print $2}')" = "4"
          test "$(pdfinfo docs/Russell-Dudek-Foundation-Data-120-Day-Plan.pdf | awk '/^Pages:/ {print $2}')" = "3"
          test "$(pdfinfo docs/Russell-Dudek-Foundation-Data-Operating-Review.pdf | awk '/^Pages:/ {print $2}')" = "2"
      - name: Commit complete campaign to main
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish complete Foundation Data candidate vision'
          git push origin HEAD:main
