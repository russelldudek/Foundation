name: Publish complete candidate campaign

on:
  push:
    branches: [main]
    paths:
      - '.payload/**'
      - '.github/workflows/bootstrap.yml'

permissions:
  contents: write

jobs:
  publish-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruct audited source
        run: |
          cat .payload/part* | base64 --decode > /tmp/foundation-source.zip
          echo '9cac3e0b2d0b56f298427cc2feb101cc32838f3873e5ec893e3d745112602d98  /tmp/foundation-source.zip' | sha256sum --check
          unzip -o /tmp/foundation-source.zip -d .
          rm -rf .payload .github/workflows/bootstrap.yml
      - name: Commit readable campaign source
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish complete audited candidate campaign'
          git push origin main
