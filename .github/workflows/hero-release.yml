name: Publish Decision Chassis hero

on:
  push:
    branches: [main]
    paths:
      - '.payload/**'
      - '.github/workflows/hero-release.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reconstruct audited source
        run: |
          cat .payload/part* | base64 --decode > /tmp/foundation-hero-source.zip
          echo 'a0f3f301f5d1462dcdf1933e1c86876ff3e97855b7905ea7aec4484778bb9ed2  /tmp/foundation-hero-source.zip' | sha256sum --check
          unzip -o /tmp/foundation-hero-source.zip -d .
          rm -rf .payload .github/workflows/hero-release.yml
          rm -f site-1.css site-2.css site-3.css home-part1.js home-part2.js home-part3.js home-render.js
          rm -f qa/tree-probe-main.txt qa/tree-probe.txt qa/probe2.txt qa/tree-test-uncommitted.txt
      - name: Verify corrected source
        run: |
          node --check hero-engine.js
          node --check app.js
          test -s index.html
          test -s site.css
          test -s resume.html
          test -s qa/hero-regression.json
          test -s qa/resume-screen-qa.json
          ! grep -RniE 'Food Safety Management|Food Safety' --include='*.html' --include='*.md' --include='*.js' --include='*.css' .
          ! grep -RniE 'role[ -]?forge' --include='*.html' --include='*.md' --include='*.js' --include='*.css' .
      - name: Commit readable corrected campaign
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Reimagine Foundation Data hero as Decision Chassis'
          git push origin HEAD:main
          git push origin HEAD:gh-pages --force
