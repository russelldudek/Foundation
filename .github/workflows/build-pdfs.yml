name: Build campaign PDFs and publish site

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PDF renderer
        run: |
          python -m pip install --upgrade pip
          pip install playwright==1.57.0 pypdf==5.9.0
          python -m playwright install --with-deps chromium
      - name: Generate PDFs from the authoritative HTML layouts
        run: python generate_pdfs.py
      - name: Verify pagination
        run: |
          python - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader
          expected = {
              'Russell-Dudek-Foundation-Data-Resume.pdf': 2,
              'Russell-Dudek-Foundation-Data-Cover-Letter.pdf': 1,
              'Russell-Dudek-Foundation-Data-Interview-Thesis-Brief.pdf': 2,
              'Russell-Dudek-Foundation-Data-120-Day-Plan.pdf': 2,
              'Russell-Dudek-Foundation-Data-Operating-Review.pdf': 2,
          }
          for name, pages in expected.items():
              path = Path('docs') / name
              assert path.exists() and path.stat().st_size > 0, name
              actual = len(PdfReader(str(path)).pages)
              assert actual == pages, f'{name}: expected {pages}, got {actual}'
              print(f'{name}: {actual} pages')
          PY
      - name: Commit generated downloads and publish GitHub Pages
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/*.pdf
          if ! git diff --cached --quiet; then
            git commit -m 'Generate complete campaign PDFs'
            git push origin HEAD:main
          fi
          git push origin HEAD:gh-pages
