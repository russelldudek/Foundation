name: Publish Decision Chassis and campaign PDFs

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Reconstruct audited readable source
        run: |
          { cat .payload/part00; cat .payload/fix01a; cat .payload/fix01b; cat .payload/part02; cat .payload/part03; } | base64 --decode > /tmp/foundation-hero-source.zip
          echo 'a0f3f301f5d1462dcdf1933e1c86876ff3e97855b7905ea7aec4484778bb9ed2  /tmp/foundation-hero-source.zip' | sha256sum --check
          unzip -o /tmp/foundation-hero-source.zip -d .
          cp .payload/build-pdfs-standard.yml .github/workflows/build-pdfs.yml
          rm -rf .payload
          rm -f .github/workflows/hero-release.yml
          rm -f site-1.css site-2.css site-3.css
          rm -f home-part1.js home-part2.js home-part3.js home-render.js
          rm -f qa/tree-probe-main.txt qa/tree-probe.txt qa/probe2.txt qa/tree-test-uncommitted.txt
      - name: Install PDF renderer
        run: |
          python -m pip install --upgrade pip
          pip install playwright==1.57.0 pypdf==5.9.0
          python -m playwright install --with-deps chromium
      - name: Generate authoritative PDFs
        run: python generate_pdfs.py
      - name: Verify corrected release
        run: |
          node --check hero-engine.js
          node --check app.js
          test -s index.html
          test -s site.css
          test -s resume.html
          test -s qa/hero-regression.json
          test -s qa/resume-screen-qa.json
          ! grep -RniE 'Food Safety Management|Food Safety' --include='*.html' --include='*.md' --include='*.js' --include='*.css' .
          ! grep -RniE 'role[ -]?forge' --include='*.html' --include='*.md' --include='*.js' --include='*.css' .
          python - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader
          expected = {
              'Russell-Dudek-Foundation-Data-Resume.pdf': 2,
              'Russell-Dudek-Foundation-Data-Cover-Letter.pdf': 1,
              'Russell-Dudek-Foundation-Data-Interview-Thesis-Brief.pdf': 2,
              'Russell-Dudek-Foundation-Data-120-Day-Plan.pdf': 2,
              'Russell-Dudek-Foundation-Data-Operating-Review.pdf': 2,
          }
          for name, pages in expected.items():
              path = Path('docs') / name
              assert path.exists() and path.stat().st_size > 0, name
              actual = len(PdfReader(str(path)).pages)
              assert actual == pages, f'{name}: expected {pages}, got {actual}'
              print(f'{name}: {actual} pages')
          resume_text = '\n'.join(
              (page.extract_text() or '')
              for page in PdfReader('docs/Russell-Dudek-Foundation-Data-Resume.pdf').pages
          ).lower()
          assert 'food safety' not in resume_text
          PY
      - name: Commit and publish exact release
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Reimagine Foundation Data hero as Decision Chassis'
          git push origin HEAD:main
          git push origin HEAD:gh-pages --force
